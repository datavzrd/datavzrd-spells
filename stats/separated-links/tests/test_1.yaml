datasets:
  test:
    path: data_genes.tsv
    separator: "\t"

views:
  test:
    dataset: test
    render-table:
      columns:
        genes:
          spell:
            url: ../spell.yaml
            with:
              # If the user specifies no separator, we use a comma as default
              # separator: ","
              url_template: "https://www.genecards.org/cgi-bin/carddisp.pl?gene=${value}"
