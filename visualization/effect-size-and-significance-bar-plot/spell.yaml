__use_yte__: true

custom-plot:
    data: |
      ?f"""function(value, row) {{ return [{{"significance": row["{effect_significance}"], "size": row["{effect_size}"]}}] }}"""
    vega-controls: true
    spec: |
        ?f"""{{
          "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
          "width": 50,
          "height": 10,
          "transform": [
            {{
              "calculate": "-(log(datum.significance)/log(10))*datum.effect_size",
              "as": "signed_pi"
            }}
          ],
          "mark": "rule",
          "encoding": {{
              "tooltip": [
                  {{"field": "size", "title": "{effect_size}"}},
                  {{"field": "significance", "title": "{effect_significance}"}},
                  {{"field": "signed_pi, "title": "signed pi value"}}
              ],
              "color": {{
                "field": "signed_pi",
                "scale": {{
                  "type": "linear",
                  "scheme": "blueorange",
                  "domainMid": 0
                }}
              }},
              "x": {{
                "value": 0
              }},
              "x2": {{
                "field": "size",
                "type": "quantitative"
              }},
              "strokeWidth": {{
                "field": "significance",
                "scale": {{
                  "type": "log",
                  "range": [1, 10],
                  "domain": [0.001, 1],
                  "reverse": true
                }}
              }},
          }},
          "config": {{
              "background": null,
              "style": {{"cell": {{"stroke": "transparent"}}}}
          }}
        }}
        """
