__use_yte__: true

custom-plot:
    data: |
      ?f"""function(value, row) {{ return [{{"size": row["{effect_significance}"], "color": row["{effect_size}"]}}] }}"""
    vega-controls: true
    spec: |
        ?f"""{{
          "$schema": "https://vega.github.io/schema/vega-lite/v5.json",
          "width": 50,
          "height": 10,
          "mark": "circle",
          "encoding": {{
              "tooltip": [
                  {{"field": "size", "title": "{effect_significance}"}},
                  {{"field": "color", "title": "{effect_size}"}}
              ],
              "color": {{
                  "field": "color",
                  "scale": {{
                      "type": "linear",
                      "domain": [{effect_size_domain_min}, {effect_size_domain_max}],
                      "domainMid": "{effect_size_domain_mid}",
                      "scheme": "{effect_size_color_scheme}"
                  }}
              }},
              "size": {{
                  "field": "size",
                  "scale": {{
                      "type": "threshold",
                      "domain": [0.01, 0.05, 0.1],
                      "range": [300, 200, 100, 20]
                  }},
                  "axis": {{
                      "title": null,
                      "ticks": false,
                      "labels": false,
                      "grid": false,
                      "offset": -11
                  }}
              }},
              "y": {{"value": 0, "scale": {{"domain": [0, 1]}}}}
          }},
          "config": {{
              "background": null,
              "style": {{"cell": {{"stroke": "transparent"}}}}
          }}
        }}
        """
